<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Формы</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <form class="form">
      <fieldset class="form-group">
        <legend class="form-group-title">Ваши личные данные</legend>
        <label class="label"> Ваше имя </label>
        <input
          type="text"
          class="input"
          placeholder="Имя"
          name="name"
          required
        />
        <label class="label"> Ваш возраст </label>
        <input
          type="number"
          class="input"
          placeholder="Возраст"
          inputmode="numeric"
          name="age"
          required
        />
        <label class="label"> Ваш номер телефона </label>
        <input
          type="tel"
          class="input"
          placeholder="Номер телефона"
          inputmode="tel"
          name="tel"
          required
        />
        <label class="label"> Ваша почта </label>
        <input
          type="email"
          class="input"
          placeholder="Ваша почта"
          inputmode="email"
          name="email"
          required
        />
      </fieldset>
      <fieldset class="form-group">
        <label> Сообщение </label>
        <textarea class="textarea" placeholder="Ваше сообщение" name="message" required></textarea>
        <label class="label">
          <input class="checkbox" type="checkbox" name="checkbox" required />
          <span class="checkbox-text">Я принимаю правила</span>
        </label>
      </fieldset>
      <button class="button">Отправить</button>
    </form>
  </body>
</html>
